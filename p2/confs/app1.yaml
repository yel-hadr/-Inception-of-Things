# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1        # must match template.labels below
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
        - name: app1
          image: nginxdemos/hello   # simple page that shows server info
          ports:
            - containerPort: 80
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: app1-svc
spec:
  selector:
    app: app1          # routes to pods with this label
  ports:
    - port: 80
      targetPort: 80