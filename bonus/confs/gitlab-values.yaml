global:
  edition: ce
  hosts:
    domain: localhost
    https: false
  ingress:
    configureCertmanager: false
    tls:
      enabled: false
  initialRootPassword:
    secret: gitlab-root-password
    key: password

certmanager:
  install: false

gitlab-runner:
  install: false

prometheus:
  install: false

nginx-ingress:
  enabled: true
  controller:
    service:
      type: LoadBalancer

registry:
  enabled: false

gitlab:
  webservice:
    resources:
      requests:
        memory: 512Mi
  sidekiq:
    resources:
      requests:
        memory: 256Mi
  gitaly:
    resources:
      requests:
        memory: 256Mi

redis:
  resources:
    requests:
      memory: 64Mi

postgresql:
  resources:
    requests:
      memory: 256Mi