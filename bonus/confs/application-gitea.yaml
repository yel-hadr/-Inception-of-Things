apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: playground-gitea
  namespace: argocd
spec:
  project: default

  source:
    repoURL: http://gitea-http.gitea.svc.cluster.local:3000/gitea_admin/playground.git
    targetRevision: HEAD
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
